<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Simulador de Liquidez Imobiliária</title>

<style>

body{
font-family:Arial;
background:#f5f7fa;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.result{
margin-top:30px;
padding:20px;
background:#f1f5f9;
border-radius:10px;
}

.big{
font-size:28px;
font-weight:bold;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#111827;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Simulador de Liquidez Imobiliária</h1>

<p>Descubra quanto poderá obter hoje mantendo o direito de habitação.</p>

<div class="grid">

<div>
<label>Idade</label>
<input id="age" type="number" value="72">
</div>

<div>
<label>Valor do imóvel (€)</label>
<input id="value" type="number" value="300000">
</div>

<div>
<label>Localização</label>
<select id="location">
<option value="1.06">Grande Lisboa</option>
<option value="1.04">Grande Porto</option>
<option value="1.05">Algarve</option>
<option value="1">Outras zonas</option>
</select>
</div>

<div>
<label>Estado do imóvel</label>
<select id="condition">
<option value="1">Bom</option>
<option value="0.95">Médio</option>
<option value="0.88">A remodelar</option>
</select>
</div>

<div>
<label>Rendimento mensal desejado (€)</label>
<input id="income" type="number" value="750">
</div>

</div>

<button onclick="calculate()">Calcular</button>

<div class="result">

<p>Valor potencial imediato:</p>

<div id="upfront" class="big">—</div>

<p style="margin-top:15px">Rendimento mensal sustentável:</p>

<div id="monthly" class="big">—</div>

</div>

</div>

<script>

function getUsufructRate(age){

if(age < 60) return 0.45
if(age <=64) return 0.40
if(age <=69) return 0.35
if(age <=74) return 0.30
if(age <=79) return 0.25
if(age <=84) return 0.20
return 0.15

}

function format(v){
return v.toLocaleString("pt-PT",{style:"currency",currency:"EUR"})
}

function calculate(){

let age = Number(document.getElementById("age").value)

let value = Number(document.getElementById("value").value)

let location = Number(document.getElementById("location").value)

let condition = Number(document.getElementById("condition").value)

let usufruct = getUsufructRate(age)

let bare = 1 - usufruct

let adjusted = value * location * condition

let upfront = adjusted * bare

let monthly = (upfront * 0.05)/12

document.getElementById("upfront").innerHTML = format(upfront)

document.getElementById("monthly").innerHTML = format(monthly)

}

</script>

</body>
</html>
